name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Check Swift Version
      run: swift --version

    - name: Build
      run: swift build -v

    # ✅ 开启 coverage
    - name: Run tests with coverage
      run: swift test --enable-code-coverage

    # ✅ 生成 lcov
    - name: Generate coverage report
      run: |
        brew install lcov

        PROF_DATA=$(find .build -name "*.profdata" | head -n 1)

        BINARY=$(find .build -type f -perm +111 | grep -E "Tests.xctest|PackageTests" | head -n 1)

        echo "PROF_DATA=$PROF_DATA"
        echo "BINARY=$BINARY"

        xcrun llvm-cov export \
          -format=lcov \
          -instr-profile="$PROF_DATA" \
          "$BINARY" > coverage.lcov

    # ✅ 上传到 :contentReference[oaicite:0]{index=0}
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: coverage.lcov