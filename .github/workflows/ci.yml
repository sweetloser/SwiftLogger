name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Check Swift Version
      run: swift --version

    - name: Build
      run: swift build -v

    - name: Run tests
      env:
        SWIFT_BACKTRACE: enable
        SWIFT_BACKTRACE_MAX_FRAMES: "256"
      run: swift test
      
