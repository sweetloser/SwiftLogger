name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Check Swift Version
      run: swift --version

    - name: Build
      run: swift build -v

    # ✅ 开启 coverage
    - name: Run tests with coverage
      env:
        SWIFT_BACKTRACE: enable
        SWIFT_BACKTRACE_MAX_FRAMES: "256"
        LLVM_PROFILE_FILE: .build/coverage/%m-%p.profraw
      run: |
        set -euo pipefail

        mkdir -p .build/coverage

        # 逐个执行（方便定位 SIGSEGV/崩溃发生在哪个 suite）
        # Swift Testing 的 --filter 支持按名字匹配（suite/test 名称的子串）
        suites=(
          "Lock Tests"
          "ReadWriteLock Tests"
          "Logger.Level Tests"
          "Logger.Message Tests"
          "Logger.MetadataValue Tests"
          "Logger.MetadataProvider Tests"
          "LogHandler Tests"
          "Logger.Storage Tests"
          "StreamLogHandler Tests"
          "StdioOutputStream Tests"
          "LoggingSystem Tests"
          "Logger Tests"
        )

        for s in "${suites[@]}"; do
          echo "==== Running suite: $s ===="
          swift test --enable-code-coverage --filter "$s"
        done

    # ✅ 生成 lcov
    - name: Generate coverage report
      run: |
        brew install lcov

        PROF_DATA=$(find .build -name "*.profdata" | head -n 1)

        BINARY=$(find .build -type f -perm +111 | grep -E "Tests.xctest|PackageTests" | head -n 1)

        echo "PROF_DATA=$PROF_DATA"
        echo "BINARY=$BINARY"

        xcrun llvm-cov export \
          -format=lcov \
          -instr-profile="$PROF_DATA" \
          "$BINARY" > coverage.lcov

    # ✅ 上传到 :contentReference[oaicite:0]{index=0}
    - name: Upload coverage
      uses: codecov/codecov-action@v4
      with:
        files: coverage.lcov
